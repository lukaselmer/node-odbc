name: Create Release

on:
  push:
    tags: ["v*"]

jobs:
  build-matrix:
    strategy:
      matrix:
        node-version:
          - 22.x
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install Build Dependencies (macOS)
      if: ${{ startsWith(matrix.os, 'macos') }}
      run: brew install unixodbc
    - name: Install Build Dependencies (Linux)
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
    - name: Upgrade NPM
      run: npm install -g npm
    - name: Install node-gyp
      run: npm install -g node-gyp
    - name: Install npm dependencies
      run: npm ci --production
    - name: Patch node-pre-gyp on Windows
      if: ${{ startsWith(matrix.os, 'windows') }}
      # https://github.com/mapbox/node-pre-gyp/issues/715
      run: node .github/fix-node-pre-gyp-windows.js
    - name: Build Binary
      run: ./node_modules/.bin/node-pre-gyp rebuild --production
    - name: Package Binary
      run: ./node_modules/.bin/node-pre-gyp package
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: binaries-${{ matrix.os }}
        path: build/stage/*.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: build-matrix
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        registry-url: 'https://registry.npmjs.org'
    - name: Upgrade NPM
      run: npm install -g npm
    - name: get-npm-version
      id: package-version
      run: jq -r '"version=" + .version' package.json  >> "$GITHUB_OUTPUT"
    # Download all of the various binaries that were created
    - name: Download built binaries from workflow
      uses: actions/download-artifact@v8
      with:
        path: binaries
        pattern: binaries-*
        merge-multiple: true
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        name: ${{ steps.package-version.outputs.version }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        files:
          ./binaries/odbc-*.tar.gz
    - name: Publish to NPM
      run: npm publish --access public
