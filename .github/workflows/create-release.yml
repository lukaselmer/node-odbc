name: Create Release

on:
  push:
    tags: ["v*"]

jobs:
  build-matrix:
    strategy:
      matrix:
        node-version:
          - 22.x
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install Build Dependencies (macOS)
      if: ${{ startsWith(matrix.os, 'macos') }}
      run: brew install unixodbc
    - name: Install Build Dependencies (Linux)
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
    - name: Upgrade NPM
      run: npm install -g npm
    - name: Install node-gyp
      run: npm install -g node-gyp
    - name: Install npm dependencies
      run: npm ci
    - name: Build Prebuild
      run: npx prebuildify --napi --strip
    - name: Upload Prebuilds
      uses: actions/upload-artifact@v5
      with:
        name: prebuilds-${{ matrix.os }}
        path: prebuilds/

  create-release:
    runs-on: ubuntu-latest
    needs: build-matrix
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        registry-url: 'https://registry.npmjs.org'
    - name: Upgrade NPM
      run: npm install -g npm
    - name: get-npm-version
      id: package-version
      run: jq -r '"version=" + .version' package.json  >> "$GITHUB_OUTPUT"
    # Download all prebuilds from each platform into the prebuilds/ folder
    - name: Download prebuilds from workflow
      uses: actions/download-artifact@v8
      with:
        path: prebuilds
        pattern: prebuilds-*
        merge-multiple: true
    - name: Verify prebuild artifacts exist
      run: |
        echo "Verifying that prebuild .node artifacts exist in the prebuilds/ directory..."
        if ! find prebuilds -type f -name '*.node' | grep -q .; then
          echo "Error: No .node prebuild artifacts found under prebuilds/. Failing release."
          exit 1
        fi
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        name: ${{ steps.package-version.outputs.version }}
        generate_release_notes: true
    - name: Install npm dependencies
      run: npm ci
    - name: Publish to NPM
      run: npm publish --access public
